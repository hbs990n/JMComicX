name: Build SSL Tester

on:
  push:
    branches: [ "ssl-test" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build with Gradle (continue on error)
        working-directory: ./
        continue-on-error: true
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --continue

      - name: Upload APK if exists
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ssl-tester-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore